<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pink gradient background circle -->
  <defs>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF91A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7a91;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#pinkGradient)" />
  
  <!-- Letter A -->
  <text x="50" y="50" 
        font-family="serif" 
        font-size="60" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle" 
        dominant-baseline="central">A</text>
</svg>
